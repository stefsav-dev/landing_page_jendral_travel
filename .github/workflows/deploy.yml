name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: ".next/standalone/,.next/static/,public/"
          target: "/var/www/jendral_travel/landing_page_jendral_travel"
          overwrite: true

      - name: Restart Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd /var/www/jendral_travel/landing_page_jendral_travel
            # Copy static files into standalone
            cp -r .next/static .next/standalone/.next/
            cp -r public .next/standalone/
            echo "=== Restarting application ==="
            pm2 restart jendral_travel || pm2 start .next/standalone/server.js --name "jendral_travel"
            echo "=== Deployment complete ==="
